- spoergsmaal: Hvem henvender Riishøj Regnskabskontor sig til?
  svar: Små og mellemstore virksomheder, som ikke har brug for en fastansat på kontoret,
    men som godt kan bruge en hjælpende hånd en gang imellem — fast eller ad hoc.
- spoergsmaal: Hvilke opgaver kan du hjælpe med?
  svar: Bogføring, momsopgørelse, fakturering, debitor- og kreditorstyring, afstemning af
    bank- og girokonti, lønindberetning samt årsafslutning eller klargøring til jeres revisor.
- spoergsmaal: Hvilke systemer arbejder du i?
  svar: Bogføring i bl.a. e-conomic og Concorde C5. Løn indberettes via Dataløn, Letløn
    eller Danløn.
- spoergsmaal: Hvor foregår bogføringen?
  svar: Bogføringen kan foregå her i huset i Østbirk — I afleverer bilagene, og jeg klarer
    resten. Vi aftaler det praktiske over telefonen.
- spoergsmaal: Kan du gøre regnskabet klar til min revisor?
  svar: Ja. Jeg laver årsafslutning eller klargør materialet, så jeres revisor kan tage
    direkte over.
